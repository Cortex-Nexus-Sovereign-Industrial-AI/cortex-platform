name: Deploy platform

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node (optional)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (if package.json exists)
        run: |
          if [ -f package.json ]; then
            npm ci
          else
            echo "No package.json — skipping npm install"
          fi

      - name: Build (if build script exists)
        run: |
          if [ -f package.json ] && npm run | grep -q "build"; then
            npm run build
          else
            echo "No build step defined — skipping"
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./   # repo root contains index.html

      - name: Optional: Deploy / Sync to Shopify (requires secrets)
        if: ${{ secrets.SHOPIFY_APP_TOKEN && secrets.SHOPIFY_STORE_DOMAIN }}
        env:
          SHOPIFY_APP_TOKEN: ${{ secrets.SHOPIFY_APP_TOKEN }}
          SHOPIFY_STORE_DOMAIN: ${{ secrets.SHOPIFY_STORE_DOMAIN }}
          THEME_ID: ${{ secrets.THEME_ID }}
        run: |
          chmod +x ./scripts/deploy-shopify.sh || true
          ./scripts/deploy-shopify.sh
