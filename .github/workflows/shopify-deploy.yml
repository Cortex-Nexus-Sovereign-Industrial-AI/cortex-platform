name: Deploy Cortex Platform to Shopify

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli @shopify/theme

      - name: Deploy App and Theme to cortex-intelligence-nexus
        env:
          SHOPIFY_STORE_DOMAIN: ${{ secrets.SHOPIFY_STORE_DOMAIN }}
          SHOPIFY_API_KEY: ${{ secrets.SHOPIFY_API_KEY }}
          SHOPIFY_API_SECRET: ${{ secrets.SHOPIFY_API_SECRET }}
          SHOPIFY_ADMIN_TOKEN: ${{ secrets.SHOPIFY_ADMIN_TOKEN }}
          SHOPIFY_CLI_TTY: 0
        run: |
          echo "Deploying to $SHOPIFY_STORE_DOMAIN"
          shopify app deploy --force || echo "No app config yet, skipping"
          if [ -d "theme" ] || [ -d "shopify/theme" ]; then
            shopify theme push --store $SHOPIFY_STORE_DOMAIN --force || true
          fi
